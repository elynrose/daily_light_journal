name: church_journal
description: Church Journal — record songs, quotes, and scriptures by date.

environment:
  sdk: ">=3.0.0 <4.0.0"

version: 1.0.0+8

dependencies:
  flutter:
    sdk: flutter
  # Add your local storage dependencies here, such as Hive or SQLite
  flutter_local_notifications: ^22.0.1
  flutter_timezone: ^5.1.0
  hive: ^2.0.0
  hive_flutter: ^1.1.0
  path_provider: ^2.0.1
  timezone: ^0.11.0
  uuid: ^4.0.0
  share_plus: ^10.1.4
  file_picker: ^10.1.0
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.14.0
  http: ^1.6.0
  xml: ^7.0.1
  just_audio: ^0.10.6
  audio_session: ^0.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  hive_generator: ^1.1.0
  build_runner: ^2.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_icon.png
  adaptive_icon_background: "#F5F0E8"
  adaptive_icon_foreground: assets/app_icon.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - Bible.json
    - assets/mood_scriptures.json
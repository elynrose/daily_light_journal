name: daily_light_journal
description: >
  A simple Flutter journal app allowing users to record and search through songs,
  quotes, and scripture entries by date. This project is a starting point and
  demonstrates a basic structure with categories and local storage services.

environment:
  sdk: ">=3.0.0 <4.0.0"

version: 1.0.0+1

dependencies:
  flutter:
    sdk: flutter
  # Add your local storage dependencies here, such as Hive or SQLite
  flutter_local_notifications: ^22.0.1
  flutter_timezone: ^5.1.0
  hive: ^2.0.0
  hive_flutter: ^1.1.0
  path_provider: ^2.0.1
  timezone: ^0.11.0
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^1.1.0
  build_runner: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/songs.json
    - Bible.json
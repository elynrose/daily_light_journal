name: Release iOS

on:
  workflow_dispatch:
    inputs:
      upload_to_app_store:
        description: Upload IPA to App Store Connect after signing
        type: boolean
        default: false

jobs:
  build-ipa:
    name: Build iOS release
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Import signing certificate
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$IOS_CERTIFICATE_BASE64" ] || [ -z "$IOS_CERTIFICATE_PASSWORD" ] || [ -z "$KEYCHAIN_PASSWORD" ]; then
            echo "Signing secrets not configured. Skipping certificate import."
            exit 0
          fi

          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo "$IOS_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -z "$IOS_PROVISIONING_PROFILE_BASE64" ]; then
            echo "Provisioning profile not configured. Skipping."
            exit 0
          fi

          PROFILE_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build iOS release
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
        run: |
          if [ -n "$IOS_CERTIFICATE_BASE64" ]; then
            flutter build ipa --export-options-plist=ios/ExportOptions.plist
          else
            echo "Building unsigned iOS app because signing secrets are not configured."
            flutter build ios --release --no-codesign
          fi

      - name: Upload IPA artifact
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
        run: |
          if [ -n "$IOS_CERTIFICATE_BASE64" ]; then
            echo "artifact=ipa" >> "$GITHUB_ENV"
          else
            echo "artifact=unsigned" >> "$GITHUB_ENV"
          fi

      - name: Upload signed IPA
        if: env.artifact == 'ipa'
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: error

      - name: Upload unsigned app
        if: env.artifact == 'unsigned'
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-unsigned
          path: build/ios/iphoneos/Runner.app
          if-no-files-found: error

      - name: Upload to App Store Connect
        if: inputs.upload_to_app_store == true
        env:
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
        run: |
          if [ -z "$IOS_CERTIFICATE_BASE64" ]; then
            echo "Signed IPA is required for App Store upload."
            exit 1
          fi

          if [ -z "$APPSTORE_ISSUER_ID" ] || [ -z "$APPSTORE_API_KEY_ID" ] || [ -z "$APPSTORE_API_PRIVATE_KEY" ]; then
            echo "App Store Connect API secrets are not configured."
            exit 1
          fi

          IPA_PATH=$(find build/ios/ipa -name '*.ipa' | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found to upload."
            exit 1
          fi

          KEY_PATH=$RUNNER_TEMP/AuthKey.p8
          printf '%s\n' "$APPSTORE_API_PRIVATE_KEY" > "$KEY_PATH"

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APPSTORE_API_KEY_ID" \
            --apiIssuer "$APPSTORE_ISSUER_ID"
